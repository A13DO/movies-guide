<div class="container">
  <div class="backdrop-holder">
    <img class="backdrop" [src]="movieInfo.backdrop_path" alt="image">
  </div>
  <div class="movie-info">
    <img class="poster" [src]="movieInfo.poster_path" alt="image">
    <div class="modal">
      <img [src]="fullSPosterlink" class="modal-image">
      <span class="exit-button">X</span>
    </div>
    <div class="description">
      <div>
        <h4>{{ MovieName }}</h4>
        <p>Director by: <strong>{{ directorName }}</strong></p>
      </div>
      <p><strong>{{ movieInfo.tagline }}</strong></p>
      <p class="overview">{{ movieInfo.overview }}</p>
      <p>Rate: {{ movieInfo.vote_average }}</p>
      <p>release: {{ movieInfo.release_date }}m</p>
      <p>Time: {{ movieInfo.runtime }}m</p>
      <div class="genres">
        <p>GENRES</p>
        <p *ngFor="let genre of movieInfo.genres">
          {{ genre.name }}
        </p>
      </div>
      <h6>CAST</h6>
      <hr class="cast-line">
      <div class="cast">
        <div class="person" *ngFor="let person of movieCast.slice(0, 30)">
          <span class="actor-name">{{ person.name }}</span>
          <span class="character-name">{{ person.character }}</span>
        </div>
      </div>
    </div>
    <div class="options">
      <div class="buttons">
        <button class="watched-button option-btn">
          add
        </button>
        <button class="favorite-button option-btn">
          add
        </button>
        <button class="watchlist-button option-btn">
          add
        </button>
      </div>
      <hr>
      <a class="trailer-link" [href]="fullTrailerLink" target="_blank">Trailer</a>
    </div>

  </div>
</div>
